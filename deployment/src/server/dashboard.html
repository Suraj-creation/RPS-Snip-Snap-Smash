<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPS Admin Dashboard</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warn: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.5rem;
      line-height: 1.5;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
      color: var(--text);
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .refresh-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 1rem 0;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    .config-item {
      padding: 0.75rem;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .config-item label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    .config-item .value {
      font-size: 1.25rem;
      font-weight: 600;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }
    .stat-card {
      padding: 1rem;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card .label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    th, td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      color: var(--muted);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    tr:hover { background: rgba(255,255,255,0.02); }
    .session-id { font-family: ui-monospace, monospace; font-size: 0.8em; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .badge.complete { background: var(--success); color: var(--bg); }
    .badge.active { background: var(--accent); color: var(--bg); }
    .badge.expired { background: var(--warn); color: var(--bg); }
    .error {
      color: #f85149;
      padding: 1rem;
      background: rgba(248,81,73,0.1);
      border-radius: 6px;
      margin-bottom: 1rem;
    }
    .loading { color: var(--muted); }
  </style>
</head>
<body>
  <h1>RPS Admin Dashboard</h1>
  <p class="subtitle">Rock Paper Scissors — server config, stats, and active sessions</p>

  <div class="refresh-row">
    <button type="button" id="refresh">Refresh</button>
    <span class="muted" id="updated"></span>
  </div>

  <div id="error" class="error" style="display: none;"></div>

  <section class="section">
    <h2>Configuration</h2>
    <div id="config" class="config-grid loading">Loading…</div>
  </section>

  <section class="section">
    <h2>Game statistics</h2>
    <div id="stats" class="stats-grid loading">Loading…</div>
  </section>

  <section class="section">
    <h2>Active sessions</h2>
    <div id="sessions-wrap">
      <div id="sessions" class="loading">Loading…</div>
    </div>
  </section>

  <script>
    function fmtTime(ts) {
      if (ts == null || ts === 0) return '—';
      const d = new Date(ts * 1000);
      return d.toLocaleString();
    }

    function fmtDuration(seconds) {
      if (seconds == null || seconds === 0) return 'No timeout';
      if (seconds < 60) return seconds + 's';
      if (seconds < 3600) return Math.round(seconds / 60) + 'm';
      return Math.round(seconds / 3600) + 'h';
    }

    async function load() {
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      try {
        const [cfg, stats, sessions] = await Promise.all([
          fetch('/admin/cfg').then(r => r.ok ? r.json() : Promise.reject(new Error('Config failed'))),
          fetch('/admin/monitor/game_stats').then(r => r.ok ? r.json() : Promise.reject(new Error('Stats failed'))),
          fetch('/admin/monitor/sessions').then(r => r.ok ? r.json() : Promise.reject(new Error('Sessions failed')))
        ]);

        document.getElementById('config').innerHTML = `
          <div class="config-item">
            <label>Rounds per match</label>
            <div class="value">${cfg.max_rounds}</div>
          </div>
          <div class="config-item">
            <label>Max sessions</label>
            <div class="value">${cfg.max_sessions === 0 ? 'Unlimited' : cfg.max_sessions}</div>
          </div>
          <div class="config-item">
            <label>Session timeout</label>
            <div class="value">${fmtDuration(cfg.session_timeout_seconds)}</div>
          </div>
        `;

        document.getElementById('stats').innerHTML = `
          <div class="stat-card">
            <div class="value">${stats.total_sessions_created}</div>
            <div class="label">Sessions created</div>
          </div>
          <div class="stat-card">
            <div class="value">${stats.total_matches_completed}</div>
            <div class="label">Matches completed</div>
          </div>
          <div class="stat-card">
            <div class="value">${stats.total_rounds_played}</div>
            <div class="label">Rounds played</div>
          </div>
          <div class="stat-card">
            <div class="value">${stats.player_wins}</div>
            <div class="label">Player wins</div>
          </div>
          <div class="stat-card">
            <div class="value">${stats.server_wins}</div>
            <div class="label">Server wins</div>
          </div>
          <div class="stat-card">
            <div class="value">${stats.draws}</div>
            <div class="label">Draws</div>
          </div>
          <div class="stat-card">
            <div class="value">${stats.active_sessions}</div>
            <div class="label">Active sessions</div>
          </div>
        `;

        if (sessions.length === 0) {
          document.getElementById('sessions').innerHTML = '<p class="muted">No active sessions.</p>';
          document.getElementById('sessions').className = '';
        } else {
          document.getElementById('sessions').innerHTML = `
            <table>
              <thead>
                <tr>
                  <th>Session</th>
                  <th>User</th>
                  <th>Round</th>
                  <th>Score</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Last activity</th>
                </tr>
              </thead>
              <tbody>
                ${sessions.map(s => `
                  <tr>
                    <td><span class="session-id" title="${s.session_id}">${s.session_id.slice(0, 8)}…</span></td>
                    <td>${s.user_id || '—'}</td>
                    <td>${s.round_number} / ${s.max_rounds}</td>
                    <td>${s.player_score} – ${s.server_score}</td>
                    <td>
                      ${s.expired ? '<span class="badge expired">Expired</span>' : s.match_complete ? '<span class="badge complete">Complete</span>' : '<span class="badge active">Active</span>'}
                      ${s.winner ? ' ' + s.winner : ''}
                    </td>
                    <td>${fmtTime(s.created_at)}</td>
                    <td>${fmtTime(s.last_activity_at)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
          document.getElementById('sessions').className = '';
        }

        document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        errEl.textContent = 'Failed to load data: ' + (e.message || String(e));
        errEl.style.display = 'block';
      }
    }

    document.getElementById('refresh').addEventListener('click', load);
    load();
  </script>
</body>
</html>
